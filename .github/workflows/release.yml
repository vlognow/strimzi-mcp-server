name: Release

on:
  push:
    tags:
      - 'v*'

env:
  ECR_REGISTRY: 677637302876.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: strimzi-mcp-server

jobs:
  release:
    runs-on: organization-docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename jar for release
        run: |
          TARGET_JAR="target/strimzi-mcp-server-${{ steps.version.outputs.VERSION }}.jar"
          if [ -f "$TARGET_JAR" ]; then
            echo "Jar already has correct name: $TARGET_JAR"
          elif ls target/strimzi-mcp-server-*-SNAPSHOT.jar 1>/dev/null 2>&1; then
            mv target/strimzi-mcp-server-*-SNAPSHOT.jar "$TARGET_JAR"
          else
            mv target/strimzi-mcp-server-*.jar "$TARGET_JAR"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.VERSION_PAT }}
          files: target/strimzi-mcp-server-${{ steps.version.outputs.VERSION }}.jar
          generate_release_notes: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "677637302876"

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY --region us-east-1 \
            || aws ecr create-repository --repository-name $ECR_REPOSITORY --region us-east-1

      - name: Build and push Docker image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.VERSION }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
