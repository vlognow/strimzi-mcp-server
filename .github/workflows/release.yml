name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package -DskipTests

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename jar for release
        run: |
          TARGET_JAR="target/strimzi-mcp-server-${{ steps.version.outputs.VERSION }}.jar"
          if [ -f "$TARGET_JAR" ]; then
            echo "Jar already has correct name: $TARGET_JAR"
          elif ls target/strimzi-mcp-server-*-SNAPSHOT.jar 1>/dev/null 2>&1; then
            mv target/strimzi-mcp-server-*-SNAPSHOT.jar "$TARGET_JAR"
          else
            mv target/strimzi-mcp-server-*.jar "$TARGET_JAR"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/strimzi-mcp-server-${{ steps.version.outputs.VERSION }}.jar
          generate_release_notes: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/vlognow/strimzi-mcp-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/vlognow/strimzi-mcp-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
